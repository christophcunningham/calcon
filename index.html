<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, user-scalable=no"
        />
        <title>Calc*on</title>
        <link rel="apple-touch-icon" href="icon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            /* ══ THEMES — matched to Total Frame ══════════════════
     dark  — #000 bg, red secondary, yellow accent
     gray  — #e0e0e0 bg, olive green accent
     light — #ffffff bg, black text
  ═══════════════════════════════════════════════════════ */

            :root {
                --bg: #2a2a30;
                --surface: #141414;
                --border: #999999;
                --dim: #555;
                --mid: #999;
                --text: #ffffff;
                --accent: #ede33e;
                --ck-bg: #3a3a40;
                --quick-btn-border: var(--accent);
                --ck-op-bg: #bfe0eb;
                --ck-op-color: #1a2228;
                --ck-eq-bg: #222228;
                --ck-fn-bg: #3f3f52;
                --wheel-body-l: #111111;
                --wheel-body-m: #222222;
                --wheel-body-h: #333333;
                --wheel-sheen-l: rgba(0, 0, 0, 0.6);
                --wheel-sheen-h: rgba(255, 255, 255, 0.08);
            }

            body.theme-light {
                --bg: #e8e8e6;
                --surface: #d4d1cc;
                --border: #555555;
                --dim: #999999;
                --mid: #555555;
                --text: #000000;
                --accent: #000000;
                --ck-bg: #c8c5c0;
                --quick-btn-border: #000000;
                --ck-op-bg: #bfe0eb;
                --ck-op-color: #1a2228;
                --ck-op-border: transparent;
                --ck-eq-bg: #3d3d3d;
                --frac-thumb: #3d3d3d;
                --ck-fn-color: #ffffff;
                --ck-fn-bg: #b3b0ac;
                --wheel-body-m: #d8d8d8;
                --wheel-body-h: #c8c8c8;
                --wheel-sheen-l: rgba(255, 255, 255, 0.6);
                --wheel-sheen-h: rgba(0, 0, 0, 0.04);
            }

            /* ── TOP BAR ── */
            .top-bar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 62px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 20px;
                z-index: 350;
                background: var(--bg);
            }

            .app-name {
                font-family: "Geist", sans-serif;
                font-size: 18px;
                font-weight: 700;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--text);
            }

            .theme-dots {
                display: flex;
                gap: 14px;
            }

            .theme-dot {
                width: 15px;
                height: 15px;
                border-radius: 50%;
                cursor: pointer;
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
                border: 2px solid transparent;
                transition:
                    transform 0.15s,
                    border-color 0.15s;
                -webkit-tap-highlight-color: transparent;
                flex-shrink: 0;
            }
            .theme-dot:active {
                transform: scale(0.85);
            }
            .theme-dot.active {
                border-color: var(--mid);
            }

            .theme-dot[data-theme="dark"] {
                background: #0a0a0a;
                box-shadow: 0 0 0 1px #555;
            }
            .theme-dot[data-theme="light"] {
                background: #ffffff;
                box-shadow: 0 0 0 1px #ccc;
            }

            html {
                background: var(--bg);
                min-height: 100%;
            }

            html,
            body {
                height: 100%;
                min-height: 100dvh;
                background: var(--bg);
                font-family: "Geist", sans-serif;
                color: var(--text);
                overflow: hidden;
                touch-action: none;
            }

            @media (min-width: 768px) {
                html {
                    display: flex;
                    justify-content: center;
                    background: var(--bg);
                }
                body {
                    width: 55%;
                    min-width: 360px;
                    max-width: 520px;
                    position: relative;
                    overflow-y: auto;
                    overflow-x: hidden;
                    touch-action: auto;
                }
                .top-bar {
                    width: 55%;
                    min-width: 360px;
                    max-width: 520px;
                    left: 50%;
                    right: auto;
                    transform: translateX(-50%);
                }

                .calc-fab,
                .calc-back-fab {
                    left: 50%;
                    transform: translateX(-50%);
                }
                .calc-fab:active,
                .calc-back-fab:active {
                    transform: translateX(-50%) scale(0.91);
                }
            }

            /* Ensure theme class background fills entire viewport on mobile */
            body.theme-light,
            html:has(body.theme-light) {
                background: #e8e8e6;
            }

            /* ── LAYOUT ── */
            .app {
                min-height: 100%;
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding: 86px 16px 24px;
                gap: 0;
                background: var(--bg);
            }

            /* ── MODE TOGGLE ── */
            .mode-bar {
                display: flex;
                gap: 0;
                margin-bottom: 32px;
                width: 100%;
                max-width: 480px;
                border-bottom: 1px solid var(--border);
            }

            .mode-btn {
                font-family: "Geist", sans-serif;
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--mid);
                background: none;
                border: none;
                border-bottom: 2px solid transparent;
                padding: 0 0 10px 0;
                margin-bottom: -1px;
                flex: 1;
                cursor: pointer;
                transition:
                    color 0.15s,
                    border-color 0.15s;
                -webkit-tap-highlight-color: transparent;
            }
            .mode-btn:first-child {
            }
            .mode-btn:not(:first-child) {
            }
            .mode-btn:last-child {
            }
            .mode-btn.active {
                color: var(--text);
                border-bottom-color: var(--accent);
            }

            /* ── PPI ROW ── */
            .ppi-row {
                display: none;
                align-items: center;
                justify-content: center;
                gap: 12px;
                margin-top: 15px;
                margin-bottom: 8px;
            }
            .ppi-row.visible {
                display: flex;
            }

            /* pill toggle for PX unit (IN/CM) */
            .pill-toggle {
                display: flex;
                background: var(--surface);
                border: 1px solid var(--accent);
                border-radius: 7px;
                padding: 2px;
                gap: 2px;
            }
            .pill-btn {
                font-family: "Geist", sans-serif;
                font-size: 13px;
                letter-spacing: 0.1em;
                font-weight: 600;
                color: var(--accent);
                background: none;
                border: none;
                border-radius: 4px;
                padding: 7px 11px;
                cursor: pointer;
                line-height: 1;
                transition:
                    background 0.12s,
                    color 0.12s;
                -webkit-tap-highlight-color: transparent;
                opacity: 0.5;
            }
            .pill-btn.active {
                background: var(--accent);
                color: var(--bg);
                opacity: 1;
            }

            .ppi-btn {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: none;
                border: 1px solid var(--quick-btn-border, var(--border));
                color: var(--accent);
                font-family: "Geist", sans-serif;
                font-size: 18px;
                font-weight: 400;
                line-height: 26px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.1s,
                    color 0.1s,
                    border-color 0.1s,
                    transform 0.06s;
                -webkit-tap-highlight-color: transparent;
                -webkit-user-select: none;
                user-select: none;
                padding: 0;
            }
            .ppi-btn:active {
                background: var(--accent);
                color: var(--bg);
                border-color: var(--accent);
                transform: scale(0.88);
            }

            .ppi-display {
                display: flex;
                align-items: baseline;
                gap: 5px;
            }
            .ppi-val {
                font-size: 22px;
                font-weight: 600;
                color: var(--text);
                letter-spacing: -0.02em;
                font-variant-numeric: tabular-nums;
                min-width: 3ch;
                text-align: right;
            }
            .ppi-unit {
                font-size: 14px;
                color: var(--accent);
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            /* ── CONVERTER ROW ── */
            .converter-row {
                display: flex;
                align-items: flex-start;
                gap: 16px;
                width: 100%;
                max-width: 480px;
            }

            /* ── SINGLE WHEEL UNIT ── */
            .wheel-unit {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0;
                min-width: 0;
                overflow: hidden;
            }

            /* Unit label above wheel */
            .unit-label {
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--mid);
                transition: color 0.2s;
            }
            .wheel-unit.primary .unit-label {
                color: var(--mid);
            }

            /* Fixed-height header zone above each wheel — prevents layout shift between modes */
            .wheel-header {
                height: 42px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 12px;
                flex-shrink: 0;
            }

            /* SVG wheel */
            .wheel-container {
                width: 85px;
                height: 160px;
                cursor: grab;
                touch-action: none;
                user-select: none;
                -webkit-user-select: none;
                flex-shrink: 0;
                position: relative;
            }
            .wheel-container:active {
                cursor: grabbing;
            }

            .wheel-svg {
                width: 100%;
                height: 100%;
                overflow: visible;
                display: block;
            }

            /* Value display below wheel */
            .value-display {
                margin-top: 14px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                width: 100%;
                flex-shrink: 0;
            }

            .value-main {
                font-size: 24px;
                font-weight: 600;
                color: var(--text);
                line-height: 1.3;
                letter-spacing: -0.02em;
                font-variant-numeric: tabular-nums;
                transition: color 0.1s;
                white-space: nowrap;
                overflow: visible;
                max-width: 100%;
                text-align: center;
                padding-bottom: 4px;
                /* Scale down automatically if text overflows its container */
                width: 100%;
                display: block;
            }

            .value-main.flash {
                color: var(--accent);
            }
            .ppi-val.flash {
                color: var(--accent);
            }

            .value-sub,
            .value-half,
            .value-extra {
                display: none;
            } /* legacy — replaced by info-block */

            .info-block {
                margin-top: 10px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0;
                width: 100%;
                min-height: 120px;
                overflow: hidden;
                flex-shrink: 0;
                transition:
                    min-height 0.15s,
                    margin-top 0.15s;
            }
            .info-block.compact {
                min-height: 0;
                height: 0;
                overflow: hidden;
                margin-top: 0;
            }

            .info-row {
                display: flex;
                align-items: baseline;
                justify-content: center;
                gap: 5px;
                width: 100%;
                padding: 1px 0;
                height: 20px;
                flex-shrink: 0;
                overflow: hidden;
            }

            .info-label {
                font-size: 9px;
                font-weight: 500;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--accent);
                flex-shrink: 0;
                opacity: 0.75;
                padding-top: 1px;
            }

            .info-value {
                font-size: 12px;
                font-weight: 400;
                color: var(--mid);
                letter-spacing: 0.01em;
                font-variant-numeric: tabular-nums;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                min-width: 0;
            }

            .info-value.primary {
                font-size: 14px;
                font-weight: 700;
                color: var(--text);
            }

            .info-value.frac-display {
                font-size: 13px;
                font-weight: 700;
                color: var(--mid);
            }

            .info-frac {
                font-size: 10px;
                font-weight: 400;
                color: var(--mid);
                opacity: 0.7;
                font-variant-numeric: tabular-nums;
                margin-left: 6px;
            }

            .info-value.accent {
                color: var(--accent);
                opacity: 0.9;
            }

            .info-divider {
                width: 28px;
                height: 1px;
                background: var(--border);
                margin: 5px auto;
                opacity: 0.6;
            }

            /* ── QUICK BUTTONS ── */
            .wheel-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
            }

            .quick-stack {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .quick-btn {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: none;
                border: 1px solid var(--quick-btn-border, var(--border));
                color: var(--accent);
                font-family: "Geist", sans-serif;
                font-size: 18px;
                font-weight: 400;
                line-height: 26px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                transition:
                    background 0.1s,
                    color 0.1s,
                    border-color 0.1s,
                    transform 0.06s;
                -webkit-tap-highlight-color: transparent;
                -webkit-user-select: none;
                user-select: none;
                padding: 0;
            }
            .quick-btn:active {
                background: var(--accent);
                color: var(--bg);
                border-color: var(--accent);
                transform: scale(0.88);
            }

            .center-col {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                flex-shrink: 0;
                padding-top: 4px; /* nudge to align with wheel center */
            }

            .eq-line {
                width: 1px;
                height: 60px;
                background: var(--border);
            }

            .eq-symbol {
                font-size: 20px;
                font-weight: 700;
                color: var(--dim);
                letter-spacing: 0.05em;
            }
            .zero-btn {
                font-family: "Geist", sans-serif;
                font-size: 9px;
                font-weight: 600;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--mid);
                background: none;
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 5px 7px;
                cursor: pointer;
                transition:
                    background 0.1s,
                    color 0.1s,
                    border-color 0.1s,
                    transform 0.06s;
                -webkit-tap-highlight-color: transparent;
                flex-shrink: 0;
            }
            .zero-btn:active {
                background: var(--accent);
                color: var(--bg);
                border-color: var(--accent);
                transform: scale(0.88);
            }

            /* ── TEMP PRESETS ── */
            .temp-presets {
                display: none;
                flex-direction: column;
                gap: 6px;
                margin-top: 24px;
                width: 100%;
                max-width: 400px;
            }
            .temp-presets.visible {
                display: flex;
            }

            .preset-group {
                display: flex;
                align-items: center;
                gap: 5px;
            }

            .preset-label {
                font-family: "Geist", sans-serif;
                font-size: 9px;
                font-weight: 600;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--accent);
                opacity: 0.75;
                min-width: 32px;
                flex-shrink: 0;
            }

            .preset-btn {
                font-family: "Geist", sans-serif;
                font-size: 11px;
                font-weight: 400;
                letter-spacing: 0.04em;
                color: var(--mid);
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 5px 8px;
                cursor: pointer;
                flex: 1;
                transition:
                    background 0.1s,
                    color 0.1s,
                    border-color 0.1s;
                -webkit-tap-highlight-color: transparent;
                white-space: nowrap;
            }
            .preset-btn:active,
            .preset-btn.active {
                background: var(--accent);
                color: var(--bg);
                border-color: var(--accent);
            }

            /* ── CALC FAB ── */
            .calc-fab {
                position: fixed;
                bottom: 44px;
                left: 50%;
                transform: translateX(-50%);
                width: 58px;
                height: 58px;
                border-radius: 14px;
                background: var(--text);
                color: var(--bg);
                border: none;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 3px 16px rgba(0, 0, 0, 0.18);
                opacity: 0.82;
                transition: transform 0.12s;
                -webkit-tap-highlight-color: transparent;
            }
            .calc-fab:active {
                transform: translateX(-50%) scale(0.91);
            }

            /* ── CALC PAGE ── */
            .calc-page {
                display: none;
                position: fixed;
                inset: 0;
                background: var(--bg);
                flex-direction: column;
                align-items: center;
                padding: 60px 0 100px;
                z-index: 200;
                overflow-y: auto;
            }
            .calc-page > *:not(.calc-back-fab) {
                width: 100%;
                max-width: 480px;
                padding-left: 16px;
                padding-right: 16px;
                box-sizing: border-box;
            }
            .calc-page.open {
                display: flex;
            }

            #calcTopBar {
                display: none;
                z-index: 300;
                background: var(--bg);
            }
            #calcTopBar.open {
                display: flex;
            }

            .calc-back-fab {
                position: fixed;
                bottom: 44px;
                left: 50%;
                transform: translateX(-50%);
                width: 58px;
                height: 58px;
                border-radius: 14px;
                background: var(--text);
                color: var(--bg);
                border: none;
                cursor: pointer;
                display: none;
                align-items: center;
                justify-content: center;
                font-size: 22px;
                box-shadow: 0 3px 16px rgba(0, 0, 0, 0.18);
                z-index: 350;
                opacity: 0.82;
                transition: transform 0.12s;
                -webkit-tap-highlight-color: transparent;
            }
            .calc-back-fab.open {
                display: flex;
            }
            .calc-back-fab:active {
                transform: translateX(-50%) scale(0.91);
            }

            .calc-display {
                padding: 4px 16px 8px;
            }

            .calc-memory-row {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-top: 8px;
            }

            .calc-mem-chips {
                display: flex;
                gap: 6px;
                flex-wrap: wrap;
                flex: 1;
            }

            .calc-mem-chip {
                font-family: "Geist", sans-serif;
                font-size: 12px;
                font-weight: 600;
                color: var(--text);
                background: var(--surface);
                border: none;
                border-radius: 8px;
                padding: 5px 10px;
                cursor: pointer;
                transition:
                    background 0.1s,
                    color 0.1s;
                -webkit-tap-highlight-color: transparent;
                font-variant-numeric: tabular-nums;
            }
            .calc-mem-chip:active {
                background: var(--accent);
                color: var(--bg);
            }

            .calc-mem-clear {
                background: none;
                border: none;
                color: var(--dim);
                cursor: pointer;
                padding: 4px;
                display: flex;
                align-items: center;
                flex-shrink: 0;
                -webkit-tap-highlight-color: transparent;
            }
            .calc-mem-clear:active {
                color: var(--text);
            }

            .calc-frac-slider-wrap {
                flex: 1;
                position: relative;
                height: 40px;
                touch-action: none;
            }

            .calc-frac-canvas {
                width: 100%;
                height: 40px;
                display: block;
                pointer-events: none;
            }

            .calc-frac-thumb-el {
                position: absolute;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 26px;
                height: 26px;
                border-radius: 50%;
                background: var(--frac-thumb, var(--text));
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
                cursor: grab;
                transition: left 0.05s;
                z-index: 2;
                opacity: 0.82;
            }
            .calc-frac-thumb-el:active {
                cursor: grabbing;
            }

            .calc-frac-ticks {
                width: 100%;
                height: 8px;
                display: block;
                overflow: visible;
            }
            .calc-expr {
                font-family: "Geist", sans-serif;
                font-size: 13px;
                color: var(--dim);
                text-align: right;
                min-height: 18px;
            }
            .calc-result {
                font-family: "Geist", sans-serif;
                font-size: 52px;
                font-weight: 700;
                color: var(--text);
                text-align: right;
                line-height: 1;
                letter-spacing: -0.02em;
                font-variant-numeric: tabular-nums;
            }
            .calc-frac-hint {
                font-family: "Geist", sans-serif;
                font-size: 12px;
                color: var(--accent);
                text-align: right;
                min-height: 20px;
                padding-bottom: 8px;
            }

            .calc-keys {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                width: 100%;
            }

            .ck {
                font-family: "Geist", sans-serif;
                font-size: 20px;
                font-weight: 500;
                color: var(--text);
                background: var(--ck-bg, var(--surface));
                border: none;
                border-radius: 12px;
                height: 62px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background 0.08s,
                    transform 0.06s,
                    color 0.08s;
                -webkit-tap-highlight-color: transparent;
                -webkit-user-select: none;
                user-select: none;
                touch-action: manipulation;
                width: 100%;
                padding: 0;
            }
            .ck:active {
                transform: scale(0.92);
                background: var(--border);
            }

            .ck-fn {
                color: var(--ck-fn-color, var(--mid));
                background: var(--ck-fn-bg, var(--border));
                font-size: 16px;
            }
            .ck-back {
                background: #d94f2e;
                color: #fff;
                font-size: 26px;
            }
            .ck-back:active {
